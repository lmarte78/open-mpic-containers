name: PR Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

jobs:
  Black-Format:
    name: runner / black formatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@26.3.1
        with:
          options: "--check --verbose --line-length 120"
          src: "api-implementation/src"

  Validate-Release-Version:
    name: Validate release version intent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect release decision label
        id: decision-label
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -eu

          has_no_release_label=false
          has_decision_label=false

          if printf "%s" "$PR_LABELS" | grep -Eq '"no-release"'; then
            has_no_release_label=true
            has_decision_label=true
          elif printf "%s" "$PR_LABELS" | grep -Eq '"release:(patch|minor|major)"'; then
            has_decision_label=true
          fi

          echo "has-no-release-label=${has_no_release_label}" >> "$GITHUB_OUTPUT"
          echo "has-decision-label=${has_decision_label}" >> "$GITHUB_OUTPUT"

      - name: Validate pyproject version against release intent
        id: validate-version
        if: steps.decision-label.outputs.has-no-release-label != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -eu

          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < <(bash scripts/release-version-intent.sh validate-intent api-implementation/pyproject.toml "$PR_LABELS")

      - name: Recreate label reminder comment
        if: steps.decision-label.outputs.has-decision-label != 'true' && github.event.pull_request.head.repo.fork == false
        uses: thollander/actions-comment-pull-request@v3
        with:
          github-token: ${{ github.token }}
          comment-tag: release-label-reminder
          mode: recreate
          message: |
            **Release label reminder** — no explicit release decision label is set.

            Latest release: `${{ steps.validate-version.outputs.latest-tag }}`. Update `api-implementation/pyproject.toml` `[project].version` and add a label before merge:

            | Label | Action |
            |-------|--------|
            | `release:patch` | `${{ steps.validate-version.outputs.expected-version-patch }}` |
            | `release:minor` | `${{ steps.validate-version.outputs.expected-version-minor }}` |
            | `release:major` | `${{ steps.validate-version.outputs.expected-version-major }}` |
            | `no-release` | No version bump required; skip image build/push and draft release |

            If no label is set, `release:patch` is assumed and the version must still be updated.

      - name: Delete label reminder comment
        if: steps.decision-label.outputs.has-decision-label == 'true' && github.event.pull_request.head.repo.fork == false
        uses: thollander/actions-comment-pull-request@v3
        with:
          github-token: ${{ github.token }}
          comment-tag: release-label-reminder
          mode: delete

      - name: Enforce expected next version
        if: steps.decision-label.outputs.has-no-release-label != 'true' && steps.validate-version.outputs.matches-expected != 'true'
        run: |
          echo "Release version mismatch detected." >&2
          echo "  Latest release:     ${{ steps.validate-version.outputs.latest-tag }}" >&2
          echo "  Bump policy:        ${{ steps.validate-version.outputs.bump-kind }}" >&2
          echo "  Expected version:   ${{ steps.validate-version.outputs.expected-version }}" >&2
          echo "  Found in pyproject: ${{ steps.validate-version.outputs.project-version }}" >&2
          echo "" >&2
          echo "Fix: set [project].version = \"${{ steps.validate-version.outputs.expected-version }}\" in api-implementation/pyproject.toml" >&2
          echo "     and add a release:patch / release:minor / release:major label as appropriate." >&2
          exit 1
